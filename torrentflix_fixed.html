<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TorrentFlix — Streaming P2P</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060a;--surface:#0f1016;--card:#161820;--border:#1e2030;
  --text:#e8e8ec;--text2:#8a8a9a;--accent:#e50914;--accent2:#ff3d47;
  --cyan:#00c8ff;--gold:#ffd700;--green:#00e676;--purple:#7c3aed;
  --orange:#f97316;--teal:#0d9488;
  --glass:rgba(15,16,22,.85);--radius:8px;
}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a2d3e;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#3a3d50}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
input{font-family:inherit;color:inherit}
a{color:inherit;text-decoration:none}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;z-index:100;padding:12px 24px;display:flex;align-items:center;gap:16px;transition:background .3s;background:linear-gradient(to bottom,rgba(6,6,10,.95),transparent)}
.header.scrolled{background:rgba(6,6,10,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:var(--accent);text-shadow:0 0 30px rgba(229,9,20,.4);white-space:nowrap}
.logo span{color:var(--text)}
.nav{display:flex;gap:4px;margin-left:24px;flex-shrink:0}
.nav button{padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;color:var(--text2);transition:all .25s;white-space:nowrap}
.nav button:hover,.nav button.active{color:#fff}
.nav button.active{background:var(--accent);color:#fff}
.nav button:hover:not(.active){background:rgba(255,255,255,.08)}
.search-box{margin-left:auto;position:relative;display:flex;align-items:center;flex-shrink:0}
.search-box input{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:9px 16px 9px 40px;width:240px;font-size:14px;color:var(--text);transition:all .3s;outline:none}
.search-box input:focus{border-color:var(--accent);width:300px;background:#0a0b10}
.search-box .s-ico{position:absolute;left:12px;width:18px;height:18px;color:var(--text2);pointer-events:none}
.btn-cfg{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:18px;flex-shrink:0}
.btn-cfg:hover{background:var(--accent);border-color:var(--accent)}

/* MAIN */
.main{padding-top:64px;min-height:100vh}

/* HERO */
.hero{position:relative;height:72vh;min-height:460px;overflow:hidden;margin-bottom:20px}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center top;transition:opacity 1s}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(6,6,10,.95) 0%,rgba(6,6,10,.55) 50%,rgba(6,6,10,.15) 100%),linear-gradient(to top,var(--bg) 0%,transparent 45%)}
.hero-content{position:absolute;bottom:90px;left:48px;max-width:580px;z-index:2}
.hero-tag{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:4px 12px;border-radius:4px;margin-bottom:14px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,6vw,68px);line-height:1;letter-spacing:1px;margin-bottom:12px;text-shadow:0 4px 30px rgba(0,0,0,.6)}
.hero-info{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text2);margin-bottom:14px;flex-wrap:wrap}
.hero-info .rating{color:var(--gold);font-weight:700}
.hero-info .type-badge{background:rgba(255,255,255,.1);padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;color:#fff}
.hero-desc{font-size:14.5px;line-height:1.65;color:#ccc;margin-bottom:24px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.btn-play{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;padding:13px 32px;border-radius:8px;transition:all .2s;box-shadow:0 4px 20px rgba(229,9,20,.4)}
.btn-play:hover{background:var(--accent2);transform:translateY(-2px);box-shadow:0 8px 30px rgba(229,9,20,.5)}
.btn-info{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);backdrop-filter:blur(10px);color:#fff;font-size:15px;font-weight:600;padding:13px 28px;border-radius:8px;transition:all .2s;border:1px solid rgba(255,255,255,.15)}
.btn-info:hover{background:rgba(255,255,255,.2)}

/* ROWS */
.row{margin-bottom:32px;padding:0 24px}
.row-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.row-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.row-title .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.row-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.row-scroll::-webkit-scrollbar{display:none}

/* CARDS */
.card{flex-shrink:0;width:175px;scroll-snap-align:start;cursor:pointer;position:relative;border-radius:var(--radius);overflow:hidden;transition:transform .3s,box-shadow .3s}
.card:hover{transform:scale(1.08);z-index:5;box-shadow:0 12px 40px rgba(0,0,0,.7)}
.card-img{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--card);display:block}
.card-fallback{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;font-size:40px;background:var(--card);color:var(--text2)}
.card-overlay{position:absolute;bottom:0;left:0;right:0;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,.95));opacity:0;transition:opacity .3s}
.card:hover .card-overlay{opacity:1}
.card-overlay h4{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:3px}
.card-overlay small{font-size:11px;color:var(--text2)}
.card-rating{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);color:var(--gold);font-size:11px;font-weight:700;padding:3px 7px;border-radius:4px;opacity:0;transition:opacity .3s}
.card:hover .card-rating{opacity:1}
.card-type{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;opacity:0;transition:opacity .3s;text-transform:uppercase;letter-spacing:.5px}
.card:hover .card-type{opacity:1}
.card-type.movie{color:var(--cyan)}
.card-type.series{color:var(--green)}
.card-type.anime{color:var(--gold)}

/* DETAIL MODAL */
.modal-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 20px}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:920px;overflow:hidden;border:1px solid var(--border);box-shadow:0 40px 80px rgba(0,0,0,.6);animation:modalIn .35s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.modal-hero{position:relative;height:380px;overflow:hidden}
.modal-hero img{width:100%;height:100%;object-fit:cover}
.modal-hero .grad{position:absolute;inset:0;background:linear-gradient(to top,var(--surface) 0%,transparent 60%)}
.modal-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;font-size:20px;z-index:5;transition:all .2s;border:1px solid rgba(255,255,255,.1)}
.modal-close:hover{background:var(--accent)}
.modal-body{padding:0 32px 32px}
.modal-body .title{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:1px;margin-top:-65px;position:relative;z-index:2;line-height:1}
.modal-meta{display:flex;align-items:center;gap:10px;margin:10px 0 16px;font-size:13px;color:var(--text2);flex-wrap:wrap}
.modal-meta .rating{color:var(--gold);font-weight:700;font-size:14px}
.modal-meta .badge{background:rgba(255,255,255,.08);padding:3px 10px;border-radius:4px;font-size:12px;border:1px solid rgba(255,255,255,.05)}
.modal-desc{font-size:14.5px;line-height:1.7;color:#bbb;margin-bottom:24px}

/* SOURCES */
.sources-section{margin-top:4px}
.sources-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.sources-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.sources-count{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.btn-autoplay{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--green),#00b894);color:#000;font-size:13px;font-weight:700;padding:9px 20px;border-radius:8px;transition:all .2s;box-shadow:0 4px 15px rgba(0,230,118,.3)}
.btn-autoplay:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,230,118,.4)}
.btn-autoplay:disabled{opacity:.4;pointer-events:none}

/* EPISODE SELECTOR */
.ep-sel{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:14px;background:rgba(0,0,0,.3);border-radius:10px;border:1px solid var(--border);flex-wrap:wrap}
.ep-sel label{font-size:13px;color:var(--text2);font-weight:500;display:flex;align-items:center;gap:6px}
.ep-sel input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 12px;font-size:14px;color:var(--text);outline:none;width:70px;transition:border .2s}
.ep-sel input:focus{border-color:var(--accent)}
.ep-sel button{background:var(--accent);color:#fff;font-size:13px;font-weight:700;padding:8px 18px;border-radius:6px;transition:all .2s;white-space:nowrap}
.ep-sel button:hover{background:var(--accent2)}

/* MANUAL MAGNET */
.magnet-input{display:flex;gap:8px;margin-bottom:14px}
.magnet-input input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:13px;outline:none;transition:border .2s}
.magnet-input input:focus{border-color:var(--cyan)}
.magnet-input button{background:rgba(0,200,255,.12);color:var(--cyan);font-weight:700;padding:11px 18px;border-radius:8px;transition:all .2s;border:1px solid rgba(0,200,255,.25);white-space:nowrap;font-size:13px}
.magnet-input button:hover{background:rgba(0,200,255,.2)}

/* SOURCE LIST */
.source-list{display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto;padding-right:4px}
.source-item{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;transition:all .2s;cursor:pointer}
.source-item:hover{border-color:var(--accent);background:#0d0e14}
.source-item .quality{font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;min-width:52px;text-align:center;flex-shrink:0;color:#fff}
.q-4k,.q-2160p{background:var(--purple)!important}
.q-1080p{background:var(--accent)!important}
.q-720p{background:#0891b2!important}
.q-480p,.q-hdtv{background:#374151!important}
.q-other{background:#374151!important}
.source-item .info{flex:1;min-width:0}
.source-item .info .name{font-size:13px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.source-item .info .meta{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.source-badge{font-size:10px;font-weight:700;padding:1px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.badge-torrentio{background:rgba(229,9,20,.2);color:#ff6b6b;border:1px solid rgba(229,9,20,.3)}
.badge-yts{background:rgba(0,200,100,.15);color:#00c864;border:1px solid rgba(0,200,100,.3)}
.badge-eztv{background:rgba(0,200,255,.12);color:#00c8ff;border:1px solid rgba(0,200,255,.25)}
.badge-nyaa{background:rgba(124,58,237,.2);color:#a78bfa;border:1px solid rgba(124,58,237,.35)}
.badge-animetosho{background:rgba(249,115,22,.15);color:#fb923c;border:1px solid rgba(249,115,22,.3)}
.badge-default{background:rgba(255,255,255,.08);color:var(--text2);border:1px solid var(--border)}
.source-item .play-btn{background:var(--green);color:#000;font-size:12px;font-weight:700;padding:8px 16px;border-radius:6px;transition:all .2s;flex-shrink:0}
.source-item .play-btn:hover{transform:scale(1.05);box-shadow:0 4px 12px rgba(0,230,118,.3)}
.source-status{text-align:center;padding:28px;color:var(--text2);font-size:14px}
.source-status .spin{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:10px;display:block;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.source-status .api-list{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.api-pill{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
.no-source-hint{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.6}

/* PLAYER */
.player-view{position:fixed;inset:0;z-index:300;background:#000;display:none;flex-direction:column}
.player-view.open{display:flex}
.player-top{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:linear-gradient(to bottom,rgba(0,0,0,.85),transparent);position:absolute;top:0;left:0;right:0;z-index:10}
.player-top .back{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;padding:8px 16px;border-radius:8px;background:rgba(255,255,255,.12);transition:all .2s}
.player-top .back:hover{background:rgba(255,255,255,.22)}
.player-top .now-playing{font-size:13px;color:var(--text2);text-align:right;max-width:60%}
.player-top .now-playing strong{color:#fff;display:block;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-video{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
.player-video video{width:100%;height:100%;object-fit:contain;background:#000}
.player-stats{position:absolute;bottom:0;left:0;right:0;padding:12px 20px;background:linear-gradient(transparent,rgba(0,0,0,.9));display:flex;align-items:center;gap:20px;font-size:12px;color:var(--text2);z-index:10}
.player-stats .stat{display:flex;align-items:center;gap:5px}
.player-stats .stat .val{color:var(--green);font-weight:700}
.player-stats .progress-bar{flex:1;height:4px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden}
.player-stats .progress-bar .fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s}
.player-waiting{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--text2);z-index:5;pointer-events:none}
.player-waiting .spin2{width:48px;height:48px;border:4px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.player-waiting p{font-size:15px}

/* SETTINGS MODAL */
.settings-modal{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center}
.settings-modal.open{display:flex}
.settings-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:460px;box-shadow:0 20px 50px rgba(0,0,0,.5)}
.settings-box h3{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;margin-bottom:6px}
.settings-box .sub{color:var(--text2);font-size:13px;margin-bottom:20px;line-height:1.5}
.settings-box label{font-size:13px;color:var(--text2);margin-bottom:6px;display:block;font-weight:500}
.settings-box input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:14px;color:var(--text);outline:none;margin-bottom:16px;transition:border .2s}
.settings-box input:focus{border-color:var(--accent)}
.settings-box .btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.settings-box .btn-save{background:var(--accent);color:#fff;font-weight:700;padding:10px 24px;border-radius:8px;transition:all .2s}
.settings-box .btn-save:hover{background:var(--accent2)}
.settings-box .btn-cancel{background:rgba(255,255,255,.08);color:var(--text);padding:10px 24px;border-radius:8px;transition:all .2s}
.settings-box .btn-cancel:hover{background:rgba(255,255,255,.14)}
.settings-box .api-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;padding:12px;background:rgba(0,0,0,.3);border-radius:8px}
.settings-box .api-badges .ab{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;text-transform:uppercase}

/* LOADING */
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:70vh;flex-direction:column;gap:16px}
.loading-screen .spin{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.loading-screen p{color:var(--text2);font-size:14px}
.loading-screen small{color:#4a4a5e;font-size:12px}

/* EMPTY */
.empty-msg{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-msg .icon{font-size:48px;margin-bottom:12px}
.empty-msg h3{font-size:18px;color:var(--text);margin-bottom:8px}

/* MOBILE NAV */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(9,9,15,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:6px 0 env(safe-area-inset-bottom,6px)}
.mobile-nav .inner{display:flex;justify-content:space-around}
.mobile-nav button{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--text2);padding:4px 10px;transition:color .2s}
.mobile-nav button.active{color:var(--accent)}
.mobile-nav button .ico{font-size:20px}

/* CATEGORY GRID */
.cat-grid{display:flex;flex-wrap:wrap;gap:12px;padding-top:12px}

/* RESPONSIVE */
@media(max-width:768px){
  .header{padding:10px 14px;gap:10px}
  .logo{font-size:24px}
  .nav{display:none}
  .search-box input{width:160px}
  .search-box input:focus{width:200px}
  .hero{height:52vh;min-height:350px}
  .hero-content{left:20px;bottom:55px;max-width:92%}
  .hero-title{font-size:32px}
  .hero-btns{flex-direction:column;gap:8px}
  .row{padding:0 14px}
  .card{width:130px}
  .modal-body{padding:0 16px 24px}
  .modal-body .title{font-size:28px}
  .modal-hero{height:220px}
  .modal-bg{padding:20px 10px}
  .mobile-nav{display:block}
  .main{padding-bottom:70px}
  .ep-sel{gap:8px}
  .sources-header{flex-direction:column;align-items:flex-start}
}
</style>

<script>
// ============ APIS & CONSTANTS ============
const CINEMETA   = 'https://v3-cinemeta.strem.io';
const JIKAN      = 'https://api.jikan.moe/v4';
const TORRENTIO  = 'https://torrentio.strem.fun';
const YTS_API    = 'https://yts.mx/api/v2';
const EZTV_API   = 'https://eztv.re/api';
const ALLORIGINS = 'https://api.allorigins.win/get?url=';
const WT_CDN     = 'https://cdn.jsdelivr.net/npm/webtorrent@2.5.1/webtorrent.min.js';

const TRACKERS = [
  'udp://open.demonii.com:1337/announce',
  'udp://tracker.openbittorrent.com:80',
  'udp://tracker.coppersurfer.tk:6969',
  'udp://tracker.opentrackr.org:1337/announce',
  'udp://tracker.leechers-paradise.org:6969',
  'udp://p4p.arenabg.com:1337',
  'udp://glotorrents.pw:6969/announce',
  'wss://tracker.openwebtorrent.com',
  'wss://tracker.btorrent.xyz',
  'wss://tracker.fastcast.nz',
  'wss://tracker.webtorrent.dev',
];
const TR_PARAMS = TRACKERS.map(t => '&tr=' + encodeURIComponent(t)).join('');
function buildMagnet(hash, name) {
  return 'magnet:?xt=urn:btih:' + hash.toLowerCase() + '&dn=' + encodeURIComponent(name || '') + TR_PARAMS;
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = String(str || '');
  return d.innerHTML;
}

async function fetchProxy(url, timeout) {
  timeout = timeout || 8000;
  const abort = new AbortController();
  const tid = setTimeout(() => abort.abort(), timeout);
  try {
    const r = await fetch(url, { signal: abort.signal });
    clearTimeout(tid);
    return r;
  } catch(e) {
    clearTimeout(tid);
    throw e;
  }
}

async function fetchViaProxy(url) {
  const proxyUrl = ALLORIGINS + encodeURIComponent(url);
  const r = await fetchProxy(proxyUrl, 10000);
  const w = await r.json();
  return w.contents;
}

function normalizeCinemeta(m, type) {
  return {
    id: m.id, imdbId: m.id, malId: null, _type: type,
    title: m.name || '', name: m.name || '',
    poster_url: m.poster || ('https://images.metahub.space/poster/medium/' + m.id + '/img'),
    backdrop_url: m.background || m.poster || '',
    vote_average: parseFloat(m.imdbRating) || 0,
    release_date: m.year ? (m.year + '-01-01') : '',
    first_air_date: m.year ? (m.year + '-01-01') : '',
    overview: m.description || '',
  };
}

function normalizeJikan(a) {
  return {
    id: 'jikan_' + a.mal_id, imdbId: null, malId: a.mal_id, _type: 'anime',
    title: a.title_english || a.title || '',
    name: a.title_english || a.title || '',
    poster_url: (a.images && a.images.jpg) ? a.images.jpg.large_image_url : '',
    backdrop_url: (a.trailer && a.trailer.images) ? a.trailer.images.maximum_image_url : ((a.images && a.images.jpg) ? a.images.jpg.large_image_url : ''),
    vote_average: a.score || 0,
    release_date: a.year ? (a.year + '-01-01') : '',
    first_air_date: a.year ? (a.year + '-01-01') : '',
    overview: a.synopsis || '',
  };
}

function qualityClass(q) {
  if (!q) return 'q-other';
  const l = q.toLowerCase();
  if (l === '2160p' || l === '4k') return 'q-4k';
  if (l === '1080p') return 'q-1080p';
  if (l === '720p') return 'q-720p';
  if (l === '480p' || l === 'hdtv') return 'q-480p';
  return 'q-other';
}

function sourceBadgeClass(src) {
  if (!src) return 'badge-default';
  const l = src.toLowerCase();
  if (l.includes('yts')) return 'badge-yts';
  if (l.includes('eztv')) return 'badge-eztv';
  if (l.includes('nyaa')) return 'badge-nyaa';
  if (l.includes('animetosho') || l.includes('tosho')) return 'badge-animetosho';
  return 'badge-torrentio';
}

async function loadCatalog() {
  const [
    topMovies, topSeries, topAnime, airingAnime,
    actionMovies, horrorMovies, scifiMovies, crimeMovies, docMovies, animationMovies,
    dramaS, crimeS, thrillerMovies
  ] = await Promise.all([
    cinemetaFetch('/catalog/movie/top.json'),
    cinemetaFetch('/catalog/series/top.json'),
    jikanFetch('/top/anime?limit=24&filter=bypopularity'),
    jikanFetch('/seasons/now?limit=20'),
    cinemetaFetch('/catalog/movie/top/genre=Action.json'),
    cinemetaFetch('/catalog/movie/top/genre=Horror.json'),
    cinemetaFetch('/catalog/movie/top/genre=Sci-Fi.json'),
    cinemetaFetch('/catalog/movie/top/genre=Crime.json'),
    cinemetaFetch('/catalog/movie/top/genre=Documentary.json'),
    cinemetaFetch('/catalog/movie/top/genre=Animation.json'),
    cinemetaFetch('/catalog/series/top/genre=Drama.json'),
    cinemetaFetch('/catalog/series/top/genre=Crime.json'),
    cinemetaFetch('/catalog/movie/top/genre=Thriller.json'),
  ]);

  const nm = (arr, type) => (arr || []).map(m => normalizeCinemeta(m, type));
  const nj = (arr) => (arr || []).map(normalizeJikan);

  const movies  = nm(topMovies  && topMovies.metas,  'movie');
  const series  = nm(topSeries  && topSeries.metas,  'series');
  const anime   = nj(topAnime   && topAnime.data);
  const airing  = nj(airingAnime && airingAnime.data);

  S.catalog = {
    movies, series, anime, airing,
    action:    nm(actionMovies   && actionMovies.metas,   'movie'),
    horror:    nm(horrorMovies   && horrorMovies.metas,   'movie'),
    scifi:     nm(scifiMovies    && scifiMovies.metas,    'movie'),
    crime:     nm(crimeMovies    && crimeMovies.metas,    'movie'),
    docs:      nm(docMovies      && docMovies.metas,      'movie'),
    animation: nm(animationMovies && animationMovies.metas,'movie'),
    dramas:    nm(dramaS         && dramaS.metas,         'series'),
    crimeS:    nm(crimeS         && crimeS.metas,         'series'),
    thriller:  nm(thrillerMovies && thrillerMovies.metas, 'movie'),
  };

  // Trending: interleave top movies + series
  const trending = [];
  const maxLen = Math.max(movies.length, series.length);
  for (let i = 0; i < Math.min(maxLen, 10); i++) {
    if (movies[i]) trending.push(movies[i]);
    if (series[i]) trending.push(series[i]);
  }
  S.catalog.trending = trending;
  S.hero = trending[Math.floor(Math.random() * Math.min(8, trending.length))] || null;
}

// ============ DETAIL ============
async function getDetails(id, type) {
  if (type === 'anime' || (id + '').startsWith('jikan_')) {
    const malId = (id + '').replace('jikan_', '');
    const data = await jikanFetch('/anime/' + malId);
    if (!data || !data.data) return null;
    const a = data.data;
    const base = normalizeJikan(a);
    return Object.assign(base, {
      genres: (a.genres || []).map(function(g){ return { name: g.name }; }),
      runtime: a.duration || '',
      number_of_seasons: a.episodes || null,
    });
  }
  const endpoint = type === 'series' ? 'series' : 'movie';
  const data = await cinemetaFetch('/meta/' + endpoint + '/' + id + '.json');
  if (!data || !data.meta) return null;
  const m = data.meta;
  const base = normalizeCinemeta(m, type);
  base.overview = m.description || base.overview;
  const videos = m.videos || [];
  const seasons = videos.map(function(v){ return v.season || 0; }).filter(function(s){ return s > 0; });
  const maxSeason = seasons.length ? Math.max.apply(null, seasons) : 1;
  return Object.assign(base, {
    genres: (m.genres || []).map(function(g){ return { name: g }; }),
    runtime: m.runtime || '',
    number_of_seasons: maxSeason,
    _videos: videos,
  });
}

async function searchTorrentio(imdbId, type, season, episode) {
  try {
    var path = type === 'movie'
      ? '/stream/movie/' + imdbId + '.json'
      : '/stream/series/' + imdbId + ':' + season + ':' + episode + '.json';
    const r = await fetchProxy(TORRENTIO + path, 10000);
    if (!r.ok) return [];
    const data = await r.json();
    return (data.streams || []).slice(0, 18).map(function(s) {
      const rawTitle = s.title || '';
      const nameStr  = s.name  || '';
      const qm = rawTitle.match(/\b(2160p|4K|1080p|720p|480p|360p)\b/i);
      var quality = qm ? qm[1].toLowerCase() : '?';
      if (quality === '4k') quality = '2160p';
      const pm = rawTitle.match(/👥\s*(\d+)/);
      const sm = rawTitle.match(/💾\s*([\d.,]+ ?[GMK]B)/i);
      const seeds = pm ? parseInt(pm[1]) : 0;
      const size  = sm ? sm[1] : '?';
      const lines = nameStr.split('\n');
      const srcName = (lines[1] || lines[0] || 'Torrentio').trim();
      const fname = (s.behaviorHints && s.behaviorHints.filename) || rawTitle.split('\n')[0] || 'Torrentio';
      if (!s.infoHash) return null;
      return {
        title: fname, quality: quality, size: size,
        seeds: seeds, peers: seeds,
        hash: s.infoHash, fileIdx: s.fileIdx != null ? s.fileIdx : null,
        source: srcName, _src: 'Torrentio',
        magnet: buildMagnet(s.infoHash, fname),
      };
    }).filter(Boolean);
  } catch(e) { return []; }
}

async function searchYTS(title, year) {
  try {

    const r = await fetchProxy(YTS_API + '/list_movies.json?query_term=' + q + '&limit=10', 8000);
    if (!r.ok) return [];
    const data = await r.json();

      (m.torrents || []).forEach(function(t) {

          quality: t.quality, size: t.size,
          seeds: t.seeds, peers: t.peers,
          hash: t.hash, fileIdx: null,
          source: 'YTS', _src: 'YTS',
          magnet: buildMagnet(t.hash, m.title),
        });
      });
    });
    return out;
  } catch(e) { return []; }
}

async function searchEZTV(imdbId, season, episode) {
  try {
    const num = imdbId.replace('tt','');
    const url = EZTV_API + '/get-torrents?imdb_id=' + num + '&limit=40';
    var raw;
    try {
      const r = await fetchProxy(url, 6000);
      if (!r.ok) throw new Error();
      raw = await r.json();
    } catch(e2) {
      try {
        const txt = await fetchViaProxy(url);
        raw = JSON.parse(txt);
      } catch(e3) { return []; }
    }
    const sStr = season ? ('S' + String(season).padStart(2,'0') + 'E' + String(episode).padStart(2,'0')) : null;
    return ((raw && raw.torrents) || [])
      .filter(function(t){ return !sStr || (t.title||'').toUpperCase().includes(sStr.toUpperCase()); })
      .slice(0, 15)
      .map(function(t) {
        const qm = (t.title||'').match(/\b(2160p|1080p|720p|480p|HDTV)\b/i);
        const quality = qm ? qm[1].toLowerCase() : '?';
        const sizeGB = t.size_bytes ? ((t.size_bytes/1073741824).toFixed(2)+' GB') : '?';
        const mag = t.magnet_url || (t.hash ? buildMagnet(t.hash, t.title) : null);
        if (!mag) return null;
        return {
          title: t.title||'EZTV', quality: quality, size: sizeGB,
          seeds: t.seeds||0, peers: t.peers||0,
          hash: t.hash||'', fileIdx: null,
          source: 'EZTV', _src: 'EZTV', magnet: mag,
        };
      }).filter(Boolean);
  } catch(e) { return []; }
}

async function searchNyaa(title) {
  try {
    const q  = encodeURIComponent(title);
    const url = 'https://nyaa.si/?page=rss&q=' + q + '&c=1_0&f=0';
    const txt = await fetchViaProxy(url);
    const xml = new DOMParser().parseFromString(txt, 'text/xml');
    const NS  = 'https://nyaa.si/xmlns/nyaa';
    const items = Array.from(xml.querySelectorAll('item')).slice(0,15);
    return items.map(function(item) {
      const tit  = item.querySelector('title') ? item.querySelector('title').textContent : '';
      const hash = item.getElementsByTagNameNS(NS,'infoHash')[0] ? item.getElementsByTagNameNS(NS,'infoHash')[0].textContent : null;
      const seed = item.getElementsByTagNameNS(NS,'seeders')[0] ? parseInt(item.getElementsByTagNameNS(NS,'seeders')[0].textContent||'0') : 0;
      const sz   = item.getElementsByTagNameNS(NS,'size')[0] ? item.getElementsByTagNameNS(NS,'size')[0].textContent : '?';
      if (!hash) return null;
      const qm = tit.match(/\b(2160p|1080p|720p|480p)\b/i);
      return {
        title: tit + ' — Nyaa', quality: qm ? qm[1].toLowerCase() : '720p',
        size: sz, seeds: seed, peers: 0,
        hash: hash, fileIdx: null,
        source: 'Nyaa', _src: 'Nyaa', magnet: buildMagnet(hash, tit),
      };
    }).filter(Boolean);
  } catch(e) { return []; }
}

async function searchSources(item) {
  S.sources = [];
  S.sourcesLoading = true;
  render();

  const type   = item._type;
  const title  = item.title || item.name || '';
  const year   = (item.release_date || '').slice(0,4);
  const imdbId = item.imdbId;
  const se = S.season || 1;
  const ep = S.episode || 1;

  const tasks = [];
  if (type === 'movie') {
    if (imdbId) tasks.push(searchTorrentio(imdbId, 'movie', null, null));
    tasks.push(searchYTS(title, year));
  } else if (type === 'series') {
    if (imdbId) {
      tasks.push(searchTorrentio(imdbId, 'series', se, ep));
      tasks.push(searchEZTV(imdbId, se, ep));
    }
  } else if (type === 'anime') {
    tasks.push(searchNyaa(title));
    tasks.push(searchAnimeTosho(title));
    if (imdbId) tasks.push(searchTorrentio(imdbId, 'movie', null, null));
    tasks.push(searchYTS(title, year));
  }

  const results = await Promise.allSettled(tasks);
  const all = [];
  results.forEach(function(r){ if (r.status === 'fulfilled') r.value.forEach(function(s){ all.push(s); }); });

  // Deduplicate by hash
  const seen = new Set();
  const deduped = all.filter(function(s) {
    if (!s.hash) return false;
    const key = s.hash.toLowerCase();
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  // Sort: prefer 1080p with most seeds
  deduped.sort(function(a, b) {
    const order = { '2160p':0, '1080p':1, '720p':2, '480p':3 };
    const qa = order[a.quality] != null ? order[a.quality] : 9;
    const qb = order[b.quality] != null ? order[b.quality] : 9;
    if (qa !== qb) return qa - qb;
    return (b.seeds||0) - (a.seeds||0);
  });

  S.sources = deduped;
  S.sourcesLoading = false;
  render();

  // ── Verificação de fontes (semelhante ao testarCanal do tv.html) ──────────
  // Testa cada fonte em paralelo: HEAD → GET → fallback proxy.
  // Atualiza S.sources[i].status = 'ok'|'fail'|'checking' em tempo real.
  verificarFontes(S.sources);
}

// ============ VERIFICAÇÃO DE FONTES (igual ao testarCanal do tv.html) ============
// Testa a acessibilidade de cada fonte em paralelo com HEAD → GET → proxies.
// Atualiza o badge de status em tempo real sem bloquear a UI.

var VERIFY_PROXIES = [
  'https://corsproxy.io/?url=',
  'https://api.allorigins.win/raw?url=',
  'https://thingproxy.freeboard.io/fetch/',
];
var VERIFY_TIMEOUT  = 7000;   // ms por tentativa
var VERIFY_PARALELO = 4;      // verificações simultâneas

function verificarFonte(src, cb) {
  // Estratégia 1: se seeds > 0 da API, consideramos "verificada" imediatamente.
  // Estratégia 2: tentamos um HEAD (depois GET) na URL da API de origem para
  //              confirmar que o endpoint está respondendo.
  // Estratégia 3: fallback via proxies CORS.
  if (src.seeds && src.seeds > 0) { cb('ok'); return; }

  // Sem dados de seeds: tentar probing real no endpoint Torrentio / YTS / EZTV
  var probeUrl = null;
  if (src._src === 'Torrentio' && S.selectedItem) {
    var id   = S.selectedItem.imdbId || '';
    var type = S.selectedItem._type || 'movie';
    probeUrl = type === 'movie'
      ? 'https://torrentio.strem.fun/stream/movie/' + id + '.json'
      : 'https://torrentio.strem.fun/stream/series/' + id + ':' + (S.season||1) + ':' + (S.episode||1) + '.json';
  } else if (src._src === 'YTS') {
    probeUrl = 'https://yts.mx/api/v2/list_movies.json?query_term=a&limit=1';
  } else if (src._src === 'EZTV') {
    probeUrl = 'https://eztv.re/api/get-torrents?limit=1';
  } else if (src._src === 'Nyaa') {
    probeUrl = 'https://nyaa.si/?page=rss&q=test&c=1_0&f=0&limit=1';
  } else if (src._src === 'AnimeTosho') {
    probeUrl = 'https://feed.animetosho.org/json?q=test&only_tor=1&limit=1';
  }

  if (!probeUrl) { cb('ok'); return; }  // sem URL para testar: assumir ok

  var tentativas = [probeUrl];
  for (var pi = 0; pi < VERIFY_PROXIES.length; pi++) {
    tentativas.push(VERIFY_PROXIES[pi] + encodeURIComponent(probeUrl));
  }
  var ti = 0, resolvido = false;
  var tmr = setTimeout(function() { resolver(false); }, VERIFY_TIMEOUT + 2000);

  function resolver(ok) {
    if (resolvido) return; resolvido = true;
    clearTimeout(tmr);
    try { cb(ok ? 'ok' : 'fail'); } catch(e) {}
  }

  function next() {
    if (ti >= tentativas.length) { resolver(false); return; }
    var u = tentativas[ti++];
    try {
      var r = new XMLHttpRequest();
      r.open('HEAD', u, true);
      try { r.timeout = Math.floor(VERIFY_TIMEOUT * 0.55); } catch(e) {}
      r.onreadystatechange = function() {
        if (r.readyState !== 4) return;
        if (r.status >= 200 && r.status < 400) { resolver(true); }
        else if (r.status === 405) {
          // HEAD não permitido → tenta GET parcial
          try {
            var r2 = new XMLHttpRequest();
            r2.open('GET', u, true);
            try { r2.timeout = Math.floor(VERIFY_TIMEOUT * 0.45); } catch(e) {}
            r2.onreadystatechange = function() {
              if (r2.readyState >= 2) {
                try { r2.abort(); } catch(e) {}
                if (r2.status >= 200 && r2.status < 400) resolver(true); else next();
              }
            };
            r2.onerror = r2.ontimeout = function() { try { next(); } catch(e) { resolver(false); } };
            r2.send();
          } catch(e2) { next(); }
        } else { next(); }
      };
      r.onerror = r.ontimeout = function() { try { next(); } catch(e) { resolver(false); } };
      r.send();
    } catch(e) { next(); }
  }
  next();
}

function verificarFontes(lista) {
  if (!lista || lista.length === 0) return;
  // Marca todas como "verificando"
  for (var i = 0; i < lista.length; i++) lista[i].status = 'checking';
  render();

  var idx     = 0;
  var ativos  = 0;
  var total   = lista.length;

  function lancar() {
    while (ativos < VERIFY_PARALELO && idx < total) {
      (function(src) {
        ativos++;
        verificarFonte(src, function(status) {
          src.status = status;
          ativos--;
          renderSourcesOnly(); // atualização leve sem reconstruir tudo
          lancar();
        });
      })(lista[idx++]);
    }
  }
  setTimeout(lancar, 100);
}

// Atualiza só a lista de fontes sem re-renderizar o modal inteiro (mais rápido)
function renderSourcesOnly() {
  var el = document.querySelector('.source-list');
  if (!el || !S.sources) return;
  el.innerHTML = S.sources.map(function(src, idx) {
    return buildSourceItemHtml(src, idx);
  }).join('');
}

function buildSourceItemHtml(src, idx) {
  const qc  = qualityClass(src.quality);
  const bc  = sourceBadgeClass(src._src || src.source);
  const seedsLbl = src.seeds > 0 ? ('🌱 ' + src.seeds) : '';
  const peersLbl = src.peers > 0 ? ('👥 ' + src.peers) : '';
  const sizeLbl  = src.size && src.size !== '?' ? ('💾 ' + src.size) : '';
  const metaParts = [seedsLbl, peersLbl, sizeLbl].filter(Boolean).join(' · ');

  // ── Badge de status de verificação ──
  var statusBadge = '';
  if (src.status === 'checking') {
    statusBadge = '<span style="font-size:10px;padding:2px 7px;border-radius:3px;background:rgba(255,170,0,.15);color:#ffaa00;border:1px solid rgba(255,170,0,.35);font-weight:700;">⟳ verificando</span>';
  } else if (src.status === 'ok') {
    statusBadge = '<span style="font-size:10px;padding:2px 7px;border-radius:3px;background:rgba(0,230,118,.15);color:#00e676;border:1px solid rgba(0,230,118,.35);font-weight:700;">✔ online</span>';
  } else if (src.status === 'fail') {
    statusBadge = '<span style="font-size:10px;padding:2px 7px;border-radius:3px;background:rgba(255,50,50,.12);color:#ff6b6b;border:1px solid rgba(255,50,50,.25);font-weight:700;">✘ falhou</span>';
  }

  // Fontes com falha ficam levemente apagadas mas ainda clicáveis
  var itemStyle = src.status === 'fail' ? ' style="opacity:.55"' : '';

  return '<div class="source-item"' + itemStyle + '>' +
    '<span class="quality ' + qc + '">' + esc(src.quality || '?') + '</span>' +
    '<div class="info">' +
      '<div class="name">' + esc(src.title) + '</div>' +
      '<div class="meta" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">' +
        (metaParts ? '<span>' + metaParts + '</span>' : '') +
        '<span class="source-badge ' + bc + '">' + esc(src._src || src.source || '?') + '</span>' +
        statusBadge +
      '</div>' +
    '</div>' +
    '<button class="play-btn" onclick="playSource(' + idx + ')">▶ Play</button>' +
  '</div>';
}

// ============ WEBTORRENT ============
function loadWebTorrent() {
  // WebTorrent é carregado via tag <script> estática no <head>.
  // Esta função apenas confirma que está pronto, com espera de até 5 s.
  return new Promise(function(resolve, reject) {
    if (window.WebTorrent) { resolve(); return; }
    var elapsed = 0;
    var iv = setInterval(function() {
      if (window.WebTorrent) { clearInterval(iv); resolve(); return; }
      elapsed += 100;
      if (elapsed >= 5000) {
        clearInterval(iv);
        reject(new Error('WebTorrent não disponível. Verifique sua conexão com a internet.'));
      }
    }, 100);
  });
}

async function playMagnet(magnetURI, title, fileIdx) {
  try { await loadWebTorrent(); }
  catch(e) { alert(e.message || 'Erro ao inicializar WebTorrent. Verifique sua conexão.'); return; }

  if (S.currentTorrent) { try { S.currentTorrent.destroy(); } catch(e){} S.currentTorrent = null; }
  if (!S.wtClient) {
    S.wtClient = new WebTorrent();
    S.wtClient.on('error', function(err) { console.error('WT:', err); });
  }

  S.playerTitle = title;
  S.playerFileIdx = (fileIdx != null) ? fileIdx : null;
  S.playerOpen = true;
  S.playerBuffering = true;
  S.playerStats = { speed: 0, peers: 0, progress: 0, downloaded: 0 };
  render();

  const videoEl = document.getElementById('mainVideo');

  S.wtClient.add(magnetURI, {
    announce: [
      'wss://tracker.openwebtorrent.com',
      'wss://tracker.btorrent.xyz',
      'wss://tracker.fastcast.nz',
      'wss://tracker.webtorrent.dev',
    ]
  }, function(torrent) {
    S.currentTorrent = torrent;

    var file;
    if (S.playerFileIdx != null && torrent.files[S.playerFileIdx]) {
      file = torrent.files[S.playerFileIdx];
    } else {
      file = torrent.files.reduce(function(best, f) {
        if (!/\.(mp4|mkv|avi|webm|mov|m4v)$/i.test(f.name)) return best;
        return (!best || f.length > best.length) ? f : best;
      }, null);
    }

    if (!file) {
      alert('Nenhum arquivo de vídeo encontrado neste torrent.');
      closePlayer();
      return;
    }

    file.renderTo(videoEl, { autoplay: true }, function(err) {
      if (err) console.error('Render error:', err);
      else {
        S.playerBuffering = false;
        var w = document.getElementById('playerWaiting');
        if (w) w.style.display = 'none';
      }
    });

    videoEl.oncanplay = function() {
      S.playerBuffering = false;
      var w = document.getElementById('playerWaiting');
      if (w) w.style.display = 'none';
    };

    var iv = setInterval(function() {
      if (!S.currentTorrent) { clearInterval(iv); return; }
      S.playerStats = {
        speed: (torrent.downloadSpeed / 1048576).toFixed(2),
        peers: torrent.numPeers,
        progress: Math.round(torrent.progress * 100),
        downloaded: (torrent.downloaded / 1048576).toFixed(1),
      };
      updatePlayerStats();
    }, 1000);
  });
}

function closePlayer() {
  if (S.currentTorrent) { try { S.currentTorrent.destroy(); } catch(e){} S.currentTorrent = null; }
  S.playerOpen = false;
  render();
}

function updatePlayerStats() {
  const el = document.getElementById('pStats');
  if (!el) return;
  const s = S.playerStats;
  el.innerHTML =
    '<div class="stat">⬇ <span class="val">' + s.speed + ' MB/s</span></div>' +
    '<div class="stat">👥 <span class="val">' + s.peers + ' peers</span></div>' +
    '<div class="stat">📦 <span class="val">' + s.downloaded + ' MB</span></div>' +
    '<div class="progress-bar"><div class="fill" style="width:' + s.progress + '%"></div></div>' +
    '<div class="stat"><span class="val">' + s.progress + '%</span></div>';
}

// ============ RENDER ============
function render() {

        '<div class="spin"></div>' +
        '<p>Carregando catálogo…</p>' +

      '</div>';
    return;
  }
  app.innerHTML =
    renderHeader() +
    '<div class="main">' + renderContent() + '</div>' +
    renderMobileNav() +
    renderModal() +
    renderSettings() +
    renderPlayer();
  attachEvents();
}

    { id:'movies', label:'🎬 Filmes' },
    { id:'series', label:'📺 Séries' },

    { id:'docs',   label:'📖 Docs' },

    '<div class="logo">TORRENT<span>FLIX</span></div>' +
    '<div class="nav">' + tabs.map(function(t) {
      return '<button class="' + (S.activeTab===t.id?'active':'') + '" onclick="switchTab(\'' + t.id + '\')">' + t.label + '</button>';
    }).join('') + '</div>' +
    '<div class="search-box">' +
      '<svg class="s-ico" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>' +
      '<input id="searchInput" type="text" placeholder="Buscar filmes, séries, animes…" value="' + esc(S.searchQuery) + '" />' +

}

function renderMobileNav() {

    {id:'home',   icon:'🏠',label:'Início'},
    {id:'movies', icon:'🎬',label:'Filmes'},
    {id:'series', icon:'📺',label:'Séries'},

    {id:'docs',   icon:'📖',label:'Docs'},
  ];
  return '<div class="mobile-nav"><div class="inner">' +

        '<span class="ico">' + t.icon + '</span>' + t.label + '</button>';
    }).join('') +

function renderContent() {
  if (S.view === 'search' && S.searchQuery) return renderSearchResults();
  const tab = S.activeTab;
  if (tab === 'home')   return renderHome();
  if (tab === 'movies') return renderMoviesTab();
  if (tab === 'series') return renderSeriesTab();
  if (tab === 'anime')  return renderAnimeTab();
  if (tab === 'docs')   return renderDocsTab();
  return '';
}

  return renderHero() +
    renderRow('🔥 Em Alta',           S.catalog.trending) +
    renderRow('🎬 Filmes Populares',   S.catalog.movies) +
    renderRow('📺 Séries em Destaque', S.catalog.series) +
    renderRow('⛩ Anime Top',          S.catalog.anime) +
    renderRow('💥 Ação',              S.catalog.action) +
    renderRow('🔬 Ficção Científica',  S.catalog.scifi) +
    renderRow('👻 Terror',             S.catalog.horror) +
    renderRow('🕵 Crime',             S.catalog.crime) +

}

function renderMoviesTab() {
  return renderCatGrid('🎬 Filmes Populares', S.catalog.movies) +
    renderRow('💥 Ação',             S.catalog.action) +
    renderRow('🔬 Ficção Científica', S.catalog.scifi) +
    renderRow('👻 Terror',            S.catalog.horror) +
    renderRow('🕵 Crime',            S.catalog.crime) +

function renderSeriesTab() {

}

}

function renderHero() {
  const h = S.hero;
  if (!h) return '';
  const title = h.title || h.name || '';
  const bg    = h.backdrop_url || h.poster_url || '';
  const year  = (h.release_date || h.first_air_date || '').slice(0,4);
  const typeMap = { movie:'Filme', series:'Série', anime:'Anime' };
  const typeLbl = typeMap[h._type] || 'Filme';
  const typeEmoji = h._type === 'anime' ? '⛩' : h._type === 'series' ? '📺' : '🎬';
  return '<div class="hero">' +
    '<div class="hero-bg" style="background-image:url(\'' + bg + '\')"></div>' +
    '<div class="hero-overlay"></div>' +
    '<div class="hero-content">' +
      '<div class="hero-tag">' + typeEmoji + ' ' + typeLbl + ' em Destaque</div>' +
      '<div class="hero-title">' + esc(title) + '</div>' +
      '<div class="hero-info">' +
        '<span class="rating">★ ' + (h.vote_average||0).toFixed(1) + '</span>' +
        (year ? '<span>' + year + '</span>' : '') +
        '<span class="type-badge">' + typeLbl + '</span>' +
      '</div>' +
      (h.overview ? '<div class="hero-desc">' + esc(h.overview) + '</div>' : '') +
      '<div class="hero-btns">' +
        '<button class="btn-play" onclick="openDetail(\'' + h.id + '\',\'' + h._type + '\')">▶ Assistir Agora</button>' +
        '<button class="btn-info" onclick="openDetail(\'' + h.id + '\',\'' + h._type + '\')">ℹ Mais Informações</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderRow(title, items) {
  if (!items || !items.length) return '';
  return '<div class="row">' +
    '<div class="row-head"><div class="row-title"><span class="dot"></span> ' + title + '</div></div>' +
    '<div class="row-scroll">' + items.map(renderCard).join('') + '</div>' +
  '</div>';
}

function renderCatGrid(title, items) {
  if (!items || !items.length) return '<div class="empty-msg"><div class="icon">🎬</div><h3>Nada encontrado</h3></div>';
  return '<div class="row" style="padding-top:16px">' +
    '<div class="row-head"><div class="row-title"><span class="dot"></span> ' + title + '</div></div>' +
    '<div class="cat-grid">' + items.map(renderCard).join('') + '</div>' +
  '</div>';
}

function renderCard(item) {
  const title  = item.title || item.name || '';
  const year   = (item.release_date || item.first_air_date || '').slice(0,4);
  const poster = item.poster_url || '';
  const type   = item._type || 'movie';
  const rating = (item.vote_average||0).toFixed(1);
  const typeLabel = type === 'anime' ? 'Anime' : type === 'series' ? 'Série' : 'Filme';
  const typeClass = type;
  const imgHtml = poster
    ? '<img class="card-img" src="' + poster + '" alt="' + esc(title) + '" loading="lazy" onerror="this.onerror=null;this.src=\'\';this.style.background=\'#161820\'" />'
    : '<div class="card-fallback">' + (type==='anime'?'⛩':type==='series'?'📺':'🎬') + '</div>';
  return '<div class="card" onclick="openDetail(\'' + esc(item.id) + '\',\'' + type + '\')">' +
    imgHtml +
    '<div class="card-rating">★ ' + rating + '</div>' +
    '<div class="card-type ' + typeClass + '">' + typeLabel + '</div>' +
    '<div class="card-overlay"><h4>' + esc(title) + '</h4><small>' + year + '</small></div>' +
  '</div>';
}

function renderSearchResults() {
  if (!S.searchResults.length) {
    return '<div class="empty-msg" style="padding-top:60px"><div class="icon">🔍</div><h3>Buscando "' + esc(S.searchQuery) + '"…</h3></div>';
  }
  return '<div class="row" style="padding-top:16px">' +
    '<div class="row-head"><div class="row-title"><span class="dot"></span> Resultados para "' + esc(S.searchQuery) + '"</div></div>' +
    '<div class="cat-grid">' + S.searchResults.map(renderCard).join('') + '</div>' +
  '</div>';
}

function renderModal() {
  if (!S.modalOpen || !S.selectedItem) return '<div class="modal-bg" id="modalBg"></div>';
  const i     = S.selectedItem;
  const title = i.title || i.name || '';
  const year  = (i.release_date || i.first_air_date || '').slice(0,4);
  const bg    = i.backdrop_url || i.poster_url || '';
  const genreHtml = (i.genres || []).map(function(g){ return '<span class="badge">' + esc(g.name) + '</span>'; }).join('');
  const rating = (i.vote_average||0).toFixed(1);
  const runtime = i.runtime ? ('<span>' + esc(i.runtime) + '</span>') : (i.number_of_seasons ? '<span>' + i.number_of_seasons + ' temp.</span>' : '');
  const type  = i._type || 'movie';

  // Episode selector for series
  var epSel = '';
  if (type === 'series') {
    epSel = '<div class="ep-sel">' +
      '<label>T: <input type="number" id="inSeason" value="' + S.season + '" min="1" max="' + (i.number_of_seasons||20) + '" /></label>' +
      '<label>Ep: <input type="number" id="inEpisode" value="' + S.episode + '" min="1" /></label>' +
      '<button onclick="searchEpisode()">🔍 Buscar Episódio</button>' +
    '</div>';
  }

  // Sources HTML
  var sourcesHtml = '';
  if (S.sourcesLoading) {
    const apiLabel = type === 'movie'
      ? ['Torrentio','YTS']
      : type === 'series'
      ? ['Torrentio','EZTV']
      : ['Nyaa','AnimeTosho','YTS'];
    sourcesHtml =
      '<div class="source-status">' +
        '<div class="spin"></div>' +
        '<p style="margin-top:10px">Buscando em múltiplas fontes…</p>' +
        '<div class="api-list">' + apiLabel.map(function(a){
          const cls = a==='YTS'?'badge-yts':a==='EZTV'?'badge-eztv':a==='Nyaa'?'badge-nyaa':a==='AnimeTosho'?'badge-animetosho':'badge-torrentio';
          return '<span class="api-pill source-badge ' + cls + '">' + a + '</span>';
        }).join('') + '</div>' +
      '</div>';
  } else if (S.sources.length > 0) {
    sourcesHtml = '<div class="source-list">' + S.sources.map(function(src, idx) {
      return buildSourceItemHtml(src, idx);
    }).join('') + '</div>';
  } else {
    sourcesHtml =
      '<div class="source-status">' +
        '<p>Nenhuma fonte automática encontrada.</p>' +
        '<p class="no-source-hint">Cole um link magnet abaixo ou tente buscar manualmente.</p>' +
      '</div>';
  }

  const autoBtn = !S.sourcesLoading && S.sources.length > 0
    ? '<button class="btn-autoplay" onclick="autoPlayBest()">⚡ Auto-Play Melhor Fonte (' + esc(S.sources[0].quality) + ' · ' + S.sources[0].seeds + ' seeds)</button>'
    : '<button class="btn-autoplay" disabled>⚡ Auto-Play</button>';

  const countBadge = !S.sourcesLoading && S.sources.length > 0
    ? '<span class="sources-count">' + S.sources.length + ' fontes</span>'
    : '';

  return '<div class="modal-bg open" id="modalBg" onclick="if(event.target===this)closeModal()">' +
    '<div class="modal">' +
      '<div class="modal-hero">' +
        (bg ? '<img src="' + bg + '" alt="" />' : '') +
        '<div class="grad"></div>' +
        '<button class="modal-close" onclick="closeModal()">✕</button>' +
      '</div>' +
      '<div class="modal-body">' +
        '<div class="title">' + esc(title) + '</div>' +
        '<div class="modal-meta">' +
          '<span class="rating">★ ' + rating + '</span>' +
          (year ? '<span>' + year + '</span>' : '') +
          runtime +
          genreHtml +
        '</div>' +
        '<div class="modal-desc">' + esc(i.overview || 'Sem descrição disponível.') + '</div>' +
        epSel +
        '<div class="sources-section">' +
          '<div class="sources-header">' +
            '<div class="sources-title">📡 Fontes de Streaming ' + countBadge + '</div>' +
            autoBtn +
          '</div>' +
          '<div class="magnet-input">' +
            '<input id="magnetInput" type="text" placeholder="Cole link magnet manual… (magnet:?xt=urn:btih:…)" />' +
            '<button onclick="playManualMagnet()">▶ Reproduzir</button>' +
          '</div>' +
          sourcesHtml +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderSettings() {
  const apis = [
    {label:'Cinemeta',    cls:'badge-torrentio'},
    {label:'Jikan',       cls:'badge-yts'},
    {label:'Torrentio',   cls:'badge-torrentio'},
    {label:'YTS',         cls:'badge-yts'},
    {label:'EZTV',        cls:'badge-eztv'},
    {label:'Nyaa',        cls:'badge-nyaa'},
    {label:'AnimeTosho',  cls:'badge-animetosho'},
  ];
  return '<div class="settings-modal ' + (S.settingsOpen?'open':'') + '" id="settingsModal" onclick="if(event.target===this)closeSettings()">' +
    '<div class="settings-box">' +
      '<h3>⚙ Configurações</h3>' +
      '<p class="sub">TorrentFlix usa <strong>7 APIs públicas gratuitas</strong> sem necessidade de conta.</p>' +
      '<div class="api-badges">' +
        apis.map(function(a){ return '<span class="ab api-pill source-badge ' + a.cls + '">' + a.label + '</span>'; }).join('') +
      '</div>' +
      '<label>Chave TMDB (opcional — para metadados extras)</label>' +
      '<input id="settingsTmdb" type="text" value="' + esc(S.tmdbKey) + '" placeholder="Chave TMDB v3 (opcional)…" />' +
      '<div class="btns">' +
        '<button class="btn-cancel" onclick="closeSettings()">Cancelar</button>' +
        '<button class="btn-save" onclick="saveSettings()">Salvar</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderPlayer() {
  if (!S.playerOpen) return '<div class="player-view" id="playerView"></div>';
  return '<div class="player-view open" id="playerView">' +
    '<div class="player-top">' +
      '<button class="back" onclick="closePlayer()">← Voltar</button>' +
      '<div class="now-playing">Assistindo<strong>' + esc(S.playerTitle) + '</strong></div>' +
    '</div>' +
    '<div class="player-video">' +
      '<video id="mainVideo" controls autoplay></video>' +
      '<div id="playerWaiting" class="player-waiting" style="' + (S.playerBuffering?'':'display:none') + '">' +
        '<div class="spin2"></div>' +
        '<p>Conectando aos peers…</p>' +
      '</div>' +
    '</div>' +
    '<div class="player-stats" id="pStats">' +
      '<div class="stat">Iniciando download P2P…</div>' +
    '</div>' +
  '</div>';
}

// ============ ACTIONS ============
function switchTab(tab) {
  S.activeTab = tab;
  S.view = 'home';
  S.searchQuery = '';
  render();
  window.scrollTo(0,0);
}

let _searchTimer;
function handleSearch(e) {
  S.searchQuery = e.target.value;
  clearTimeout(_searchTimer);
  if (S.searchQuery.length >= 2) {
    _searchTimer = setTimeout(function(){ searchAll(S.searchQuery); }, 450);
  } else if (!S.searchQuery) {
    S.view = 'home';
    render();
  }
}

async function openDetail(id, type) {
  S.modalOpen = true;
  S.selectedItem = null;
  S.sources = [];
  S.sourcesLoading = true;
  S.season = 1;
  S.episode = 1;
  render();
  const data = await getDetails(id, type);
  if (!data) {
    alert('Erro ao carregar detalhes. Tente novamente.');
    S.modalOpen = false;
    render();
    return;
  }
  S.selectedItem = data;
  render();
  searchSources(data);
}

function closeModal() {
  S.modalOpen = false;
  S.selectedItem = null;
  S.sources = [];
  render();
}

function playSource(idx) {
  const src = S.sources[idx];
  if (!src || !src.magnet) return;
  closeModal();
  playMagnet(src.magnet, src.title, src.fileIdx);
}

function autoPlayBest() {
  if (!S.sources.length) return;
  playSource(0);
}

function playManualMagnet() {
  const input = document.getElementById('magnetInput');
  const mag   = input && input.value.trim();
  if (!mag || !mag.startsWith('magnet:')) {
    alert('Cole um link magnet válido (começa com magnet:?xt=urn:btih:…)');
    return;
  }
  const title = (S.selectedItem && (S.selectedItem.title || S.selectedItem.name)) || 'Reprodução Manual';
  closeModal();
  playMagnet(mag, title, null);
}

function searchEpisode() {
  const s = parseInt((document.getElementById('inSeason')  || {}).value) || 1;
  const e = parseInt((document.getElementById('inEpisode') || {}).value) || 1;
  S.season  = s;
  S.episode = e;
  if (S.selectedItem) searchSources(S.selectedItem);
}

function openSettings()  { S.settingsOpen = true;  render(); }
function closeSettings() { S.settingsOpen = false; render(); }
function saveSettings() {
  const tmdb = (document.getElementById('settingsTmdb') || {}).value || '';
  S.tmdbKey = tmdb.trim();
  localStorage.setItem('tf_tmdb', S.tmdbKey);
  closeSettings();
}

// ============ EVENTS ============
function attachEvents() {
  const si = document.getElementById('searchInput');
  if (si) { si.removeEventListener('input', handleSearch); si.addEventListener('input', handleSearch); }
  window.onscroll = function() {
    const h = document.getElementById('header');
    if (h) h.classList.toggle('scrolled', window.scrollY > 50);
  };
}

// ============ INIT ============
async function initApp() {
  render();
  await loadCatalog();
  render();
}

initApp();
